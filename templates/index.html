<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyFlix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">

        <div class="header">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="PyFlix">
        </div>

        <form action="/recomendar" method="get">

            <div class="panel">
                <div class="panel-header">
                    <div class="title-bar"></div>
                    <h2 class="panel-title">Filtros</h2>
                </div>

                <div class="filter-group">
                    <label class="filter-label" for="idade_slider">Classificação etária máxima</label>
                    <div class="range-container">
                        <span class="range-output" id="valor-idade">18 Anos</span>
                        <input type="range" id="idade_slider" min="0" max="5" step="1" value="5"
                               oninput="atualizarIdade(this.value)">
                        <input type="hidden" id="idade" name="idade" value="18">
                        <div class="slider-ticks">
                            <span>Livre</span>
                            <span>10</span>
                            <span>12</span>
                            <span>14</span>
                            <span>16</span>
                            <span>18</span>
                        </div>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Nota IMDb (Mínima)</label>
                    <div class="radio-tile-group radio-imdb">
                        <label class="radio-tile-label">
                            <input type="radio" name="nota_min" value="" checked>
                            <div class="radio-tile-content">Qualquer nota</div>
                        </label>
                        <label class="radio-tile-label">
                            <input type="radio" name="nota_min" value="7">
                            <div class="radio-tile-content">7+</div>
                        </label>
                        <label class="radio-tile-label">
                            <input type="radio" name="nota_min" value="8">
                            <div class="radio-tile-content">8+</div>
                        </label>
                        <label class="radio-tile-label">
                            <input type="radio" name="nota_min" value="9">
                            <div class="radio-tile-content">9+</div>
                        </label>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Tipo de Conteúdo</label>
                    <div class="radio-tile-group radio-tipo">
                        <label class="radio-tile-label">
                            <input type="radio" name="tipo" value="qualquer" checked>
                            <div class="radio-tile-content">Filmes e Séries</div>
                        </label>
                        <label class="radio-tile-label">
                            <input type="radio" name="tipo" value="filme">
                            <div class="radio-tile-content">Filme</div>
                        </label>
                        <label class="radio-tile-label">
                            <input type="radio" name="tipo" value="serie">
                            <div class="radio-tile-content">Série</div>
                        </label>
                    </div>
                </div>

                <div class="filter-group where-to-watch">
                    <label class="filter-label">Onde assistir</label>
                    <div class="checkbox-grid">
                        {% for plataforma in plataformas %}
                            <label class="checkbox-label">
                                <input type="checkbox" name="onde" value="{{ plataforma }}">
                                <div class="checkbox-button">{{ plataforma }}</div>
                            </label>
                        {% endfor %}
                    </div>
                </div>

                <div class="genres-row">
                    <div class="filter-group want-to-see">
                        <label class="filter-label">Quero ver (Marque um ou mais)</label>
                        <div class="checkbox-grid">
                            {% for genero in generos %}
                                <label class="checkbox-label">
                                    <input type="checkbox" name="genero_quero" value="{{ genero }}">
                                    <div class="checkbox-button">{{ nomes_genero.get(genero, genero.capitalize()) }}</div>
                                </label>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="filter-group dont-want-to-see">
                        <label class="filter-label">Não quero ver</label>
                        <div class="checkbox-grid">
                            {% for genero in generos %}
                                <label class="checkbox-label">
                                    <input type="checkbox" name="genero_nao_quero" value="{{ genero }}">
                                    <div class="checkbox-button">{{ nomes_genero.get(genero, genero.capitalize()) }}</div>
                                </label>
                            {% endfor %}
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">🎲 Gerar recomendação</button>
            </div>

        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/adicionar" class="btn-secondary">➕ Adicionar novo conteúdo</a>
        </div>

    </div>

    <script>
        const classificacoes = [0, 10, 12, 14, 16, 18];

        function atualizarIdade(indice) {
            const valor = classificacoes[indice];
            document.getElementById('idade').value = valor;
            document.getElementById('valor-idade').innerText = (valor === 0 ? 'Livre' : valor + ' Anos');
            preencherSlider(indice);
        }

        function preencherSlider(indice) {
            const slider = document.getElementById('idade_slider');
            const porcentagem = (indice / slider.max) * 100;
            slider.style.background =
                `linear-gradient(to right, var(--color-primary) 0%, var(--color-primary) ${porcentagem}%, var(--bg-card) ${porcentagem}%, var(--bg-card) 100%)`;
        }

        preencherSlider(document.getElementById('idade_slider').value);
    </script>

</body>
</html>
